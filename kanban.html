<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon's Den — Kanban</title>
<script>
// Auth guard — must be first thing in <head>
(function() {
  if (!sessionStorage.getItem('dd_auth')) {
    window.location.href = 'login.html';
  }
})();
</script>
<style>
:root {
  --bg: #0d0f14; --surface: #161822; --surface2: #1c1f2b; --border: #252836;
  --text: #e8eaf0; --text-dim: #7a7e90; --text-bright: #ffffff;
  --accent: #7c6cf0; --blue: #60a5fa; --green: #34d399; --yellow: #fbbf24; --red: #f87171;
  --purple: #c084fc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-text-size-adjust: 100%; }
a { color: var(--accent); text-decoration: none; }

/* ── Header ── */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
header h1 { font-size: 1.15rem; font-weight: 700; color: var(--text-bright); letter-spacing: -0.01em; }
header nav { display: flex; gap: 12px; align-items: center; }
header nav a { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); padding: 6px 12px; border-radius: 20px; }
header nav a:hover, header nav a.active { color: var(--accent); }
header nav a.active { background: rgba(124,108,240,0.12); }
.sync-timer { font-size: 0.7rem; color: var(--text-dim); font-weight: 500; }

/* ── Kanban Board ── */
.kanban { display: flex; gap: 12px; padding: 12px; overflow-x: auto; min-height: calc(100vh - 100px); align-items: flex-start; -webkit-overflow-scrolling: touch; }
.column { min-width: 260px; max-width: 300px; flex: 0 0 auto; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); }
.column-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.column-header h2 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.column-header .count { font-size: 0.7rem; color: var(--text-dim); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
.column-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
.kanban-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
  cursor: pointer; transition: all 0.2s; position: relative; min-height: 44px;
}
.kanban-card:hover { border-color: var(--accent); }
.kanban-card .title { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.kanban-card .meta { display: flex; gap: 6px; align-items: center; font-size: 0.65rem; color: var(--text-dim); }
.kanban-card .fit { font-weight: 700; color: var(--accent); }
.kanban-card .evidence { padding: 1px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: 600; }
.evidence.strong { background: rgba(52,211,153,0.12); color: var(--green); }
.evidence.solid { background: rgba(96,165,250,0.12); color: var(--blue); }
.evidence.thin { background: rgba(251,191,36,0.12); color: var(--yellow); }
.evidence.none { background: rgba(248,113,113,0.12); color: var(--red); }
.kanban-card .source { position: absolute; top: 6px; right: 8px; font-size: 0.6rem; }
.kanban-card .reviewed-mark { color: var(--green); font-size: 0.65rem; }

/* Column accent colors */
.column[data-status="New"] .column-header { border-top: 3px solid var(--blue); }
.column[data-status="Validating"] .column-header { border-top: 3px solid var(--yellow); }
.column[data-status="Probing"] .column-header { border-top: 3px solid var(--purple); }
.column[data-status="Building"] .column-header { border-top: 3px solid var(--accent); }
.column[data-status="Live"] .column-header { border-top: 3px solid var(--green); }
.column[data-status="Parked"] .column-header { border-top: 3px solid var(--text-dim); }
.column[data-status="Dropped"] .column-header { border-top: 3px solid var(--red); }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 200; justify-content: center; align-items: center; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; position: relative; }
.modal h2 { font-size: 1rem; margin-bottom: 10px; padding-right: 30px; }
.modal .close { position: absolute; top: 12px; right: 16px; font-size: 1.5rem; cursor: pointer; color: var(--text-dim); }
.modal .section { margin-top: 12px; }
.modal .section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 4px; }
.modal .section-content { font-size: 0.85rem; }
.modal .catch { background: rgba(225,112,85,.08); border-left: 3px solid var(--red); padding: 8px 12px; border-radius: 0 6px 6px 0; font-size: 0.85rem; }
.modal .ask { background: rgba(0,184,148,.08); border-left: 3px solid var(--green); padding: 8px 12px; border-radius: 0 6px 6px 0; font-size: 0.85rem; }
.modal .decision-row { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }

/* ── Decision Buttons ── */
.decision-btn {
  padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  min-height: 44px; display: flex; align-items: center; justify-content: center; flex: 1 1 auto;
}
.decision-btn:hover { border-color: var(--accent); }
.decision-btn.validate { border-color: var(--yellow); color: var(--yellow); }
.decision-btn.probe { border-color: var(--purple); color: var(--purple); }
.decision-btn.build { border-color: var(--accent); color: var(--accent); }
.decision-btn.live { border-color: var(--green); color: var(--green); }
.decision-btn.park { border-color: var(--text-dim); color: var(--text-dim); }
.decision-btn.drop { border-color: var(--red); color: var(--red); }
.decision-btn.reviewed { border-color: var(--blue); color: var(--blue); }
.empty-col { text-align: center; padding: 16px; color: var(--text-dim); font-size: 0.75rem; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text-bright); border: 1px solid var(--border); padding: 14px 20px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; z-index: 1000; display: none; white-space: nowrap; max-width: 90vw; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.toast.show { display: block; }

/* ── Desktop ── */
@media (min-width: 768px) {
  header { padding: 14px 24px; }
  .header-top { margin-bottom: 10px; }
  header h1 { font-size: 1.35rem; }
  header nav a { font-size: 0.85rem; padding: 6px 16px; }
  .kanban { gap: 16px; padding: 20px 24px; }
  .column { min-width: 280px; max-width: 320px; }
  .column-header { padding: 12px 16px; }
  .kanban-card { padding: 10px 12px; }
  .kanban-card .title { font-size: 0.85rem; }
  .modal { padding: 24px; }
  .modal h2 { font-size: 1.1rem; }
  .decision-btn { font-size: 0.8rem; padding: 8px 16px; }
  .toast { left: auto; right: 24px; transform: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🐉 Dragon's Den</h1>
    <span class="sync-timer" id="syncTimer"></span>
  </div>
  <nav>
    <a href="index.html">Review</a>
    <a href="kanban.html" class="active">Kanban</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<div class="kanban" id="kanban"></div>
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script>
const STATUSES = ['New','Validating','Probing','Building','Live','Parked','Dropped'];
let allCards = [];
let lastSync = null;

let API_URL = 'http://localhost:5000';

// Load config.json to get the tunnel URL
fetch('config.json?t=' + Date.now())
  .then(r => r.json())
  .then(cfg => { if (cfg.api_url) API_URL = cfg.api_url; })
  .catch(() => {});

async function loadData() {
  try {
    // Load data.json directly from GitHub Pages (static file)
    const resp = await fetch('data.json?t=' + Date.now());
    const data = await resp.json();
    allCards = data.opportunities || [];
    lastSync = data.meta?.last_maintenance || data.meta?.last_discovery;
    renderKanban();
    updateSyncTimer();
  } catch(e) {
    document.getElementById('kanban').innerHTML = '<div style="padding:40px;color:var(--text-dim);">⚠️ Could not load data.</div>';
  }
}

function renderKanban() {
  const container = document.getElementById('kanban');
  container.innerHTML = '';
  
  STATUSES.forEach(status => {
    const cards = allCards.filter(c => c.status === status);
    cards.sort((a,b) => (b.fit_score||0) - (a.fit_score||0));
    
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.status = status;
    
    col.innerHTML = `
      <div class="column-header">
        <h2>${status}</h2>
        <span class="count">${cards.length}</span>
      </div>
      <div class="column-body">
        ${cards.length === 0 ? '<div class="empty-col">No cards</div>' : ''}
        ${cards.map(c => `
          <div class="kanban-card" onclick="openCard('${c.id}')">
            <div class="source">${c.source_stream === 'pain-point' ? '🩹' : '🌏'}</div>
            <div class="title">${c.title}</div>
            <div class="meta">
              <span class="fit">${c.fit_score}</span>
              <span class="evidence ${c.evidence||'none'}">${c.evidence||'—'}</span>
              ${c.reviewed ? '<span class="reviewed-mark">✓</span>' : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(col);
  });
}

function openCard(id) {
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>${c.title}</h2>
    <div style="display:flex;gap:10px;font-size:0.75rem;color:var(--text-dim);margin-bottom:16px;">
      <span style="color:var(--accent);font-weight:700;">Fit: ${c.fit_score}</span>
      <span class="evidence ${c.evidence||'none'}" style="padding:1px 6px;border-radius:4px;">${c.evidence||'—'}</span>
      <span>${c.source_stream === 'pain-point' ? '🩹 Pain Point' : '🌏 Overseas'}</span>
      <span>${c.date_found}</span>
      <span class="status-badge" style="padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:600;text-transform:uppercase;background:rgba(108,92,231,.15);color:var(--accent);">${c.status}</span>
    </div>
    <div class="section"><div class="section-title">Pain Point</div><div class="section-content">${c.pain_point||'—'}</div></div>
    <div class="section"><div class="section-title">Target Audience</div><div class="section-content">${c.target_audience||'—'}</div></div>
    <div class="section"><div class="section-title">Proposed Solution</div><div class="section-content">${c.proposed_solution||'—'}</div></div>
    <div class="section"><div class="section-title">The Catch ⚠️</div><div class="catch">${c.the_catch||'—'}</div></div>
    <div class="section"><div class="section-title">The Ask 🚀</div><div class="ask">${c.the_ask||'—'}</div></div>
    ${c.drop_reason ? `<div class="section"><div class="section-title">Drop Reason</div><div class="section-content" style="color:var(--red);">${c.drop_reason}</div></div>` : ''}
    <div class="decision-row">
      <button class="decision-btn reviewed ${c.reviewed?'active':''}" onclick="setReviewed('${c.id}',this)">✓ Reviewed</button>
      <button class="decision-btn validate" onclick="setStatus('${c.id}','Validating',this)">→ Validating</button>
      <button class="decision-btn probe" onclick="setStatus('${c.id}','Probing',this)">→ Probing</button>
      <button class="decision-btn build" onclick="setStatus('${c.id}','Building',this)">→ Building</button>
      <button class="decision-btn live" onclick="setStatus('${c.id}','Live',this)">→ Live</button>
      <button class="decision-btn park" onclick="setStatus('${c.id}','Parked',this)">→ Park</button>
      <button class="decision-btn drop" onclick="promptDrop('${c.id}')">→ Drop</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.classList.contains('close')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

async function setStatus(id, status) {
  const card = allCards.find(c => c.id === id);
  if (card) {
    card.status = status;
    card.last_updated = new Date().toISOString();
  }
  try {
    await fetch(API_URL + '/api/update', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, status})
    });
  } catch(e) {}
  renderKanban();
  closeModal();
  showToast(`→ ${card?.title?.substring(0,40)||id} → ${status}`);
}

async function setReviewed(id, btn) {
  const card = allCards.find(c => c.id === id);
  if (card) {
    card.reviewed = !card.reviewed;
    card.last_updated = new Date().toISOString();
  }
  try {
    await fetch(API_URL + '/api/update', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, reviewed: card.reviewed})
    });
  } catch(e) {}
  renderKanban();
  openCard(id); // refresh modal
  showToast(card.reviewed ? '✓ Reviewed' : 'Unreviewed');
}

function promptDrop(id) {
  const reason = prompt('Why are you dropping this opportunity?\n\nEnter a brief reason:');
  if (reason === null) return;
  const card = allCards.find(c => c.id === id);
  if (card) {
    card.status = 'Dropped';
    card.drop_reason = reason;
    card.last_updated = new Date().toISOString();
  }
  fetch(API_URL + '/api/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id, status: 'Dropped', drop_reason: reason})
  }).catch(() => {});
  renderKanban();
  closeModal();
  showToast('→ ' + (card?.title?.substring(0,40)||id) + ' dropped');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function updateSyncTimer() {
  if (!lastSync) return;
  const d = document.getElementById('syncTimer');
  const then = new Date(lastSync);
  const now = new Date();
  const mins = Math.floor((now - then) / 60000);
  if (mins < 60) d.textContent = 'Updated ' + mins + 'm ago';
  else if (mins < 1440) d.textContent = 'Updated ' + Math.floor(mins/60) + 'h ago';
  else d.textContent = 'Updated ' + Math.floor(mins/1440) + 'd ago';
}

function logout() {
  sessionStorage.removeItem('dd_auth');
  window.location.href = 'login.html';
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
